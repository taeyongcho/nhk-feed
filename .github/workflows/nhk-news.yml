name: NHK Easy Feed

on:
  schedule:
    # UTC 기준 → KST 07:30 / 13:30 / 19:30 하루 3회
    - cron: "30 22 * * *"
    - cron: "30 4 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch: {} # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch NHK Easy
        run: python fetch_nhk.py

      - name: Commit & push if changed
        run: |
          git config user.name "nhk-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add nhk-easy.json
          git diff --cached --quiet || git commit -m "feed update $(date -u +%Y-%m-%d_%H:%M)"
          git push
