name: NHK Easy Feed

concurrency:
  group: nhk-easy-feed
  cancel-in-progress: false

on:
  schedule:
    # UTC 기준 → KST 07:30 / 13:30 / 19:30 하루 3회
    - cron: "30 22 * * *"
    - cron: "30 4 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch: {} # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Generate RSS + AI easy-Japanese news feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python rss_news_feed.py

      - name: Commit & push if changed
        run: |
          git config user.name "news-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add nhk-easy.json
          git diff --cached --quiet || git commit -m "feed update $(date -u +%Y-%m-%d_%H:%M)"
          git push origin main
